services:

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER}

    restart: unless-stopped

    ports:
      - "${REDIS_PORT}:6379"

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - ai-network



  qdrant:
    image: qdrant/qdrant:latest
    container_name: ${QDRANT_CONTAINER}

    restart: unless-stopped

    ports:
      - "${QDRANT_PORT}:6333"

    volumes:
      - qdrant-data:/qdrant/storage

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://localhost:6333/health"
        ]

      interval: 15s
      timeout: 5s
      retries: 5

    networks:
      - ai-network



  ollama:
    image: ollama/ollama:latest

    container_name: ${OLLAMA_CONTAINER}

    restart: unless-stopped

    ports:
      - "${OLLAMA_PORT}:11434"

    volumes:
      - ollama-data:/root/.ollama

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://localhost:11434"
        ]

      interval: 20s
      timeout: 5s
      retries: 5

    networks:
      - ai-network



networks:

  ai-network:
    driver: bridge



volumes:

  redis-data:

  qdrant-data:

  ollama-data: